name: PowerBook
version: 1.0.0
main: com.phantomsmp.powerbook.PowerBookPlugin
api-version: '1.20'
commands:
  powerbook:
    description: Main command for PowerBook management
    aliases: [pb]
    permission: powerbook.use
permissions:
  powerbook.use:
    default: true
  powerbook.admin:
    default: op